name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: shell
            os: macos-latest
          - name: linux
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Zsh
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes zsh
      - name: Check syntax
        run: |
          zsh -n .zshrc
          sh -n install.sh
      - name: Test installation
        run: |
          test_home=$(mktemp -d)
          HOME="$test_home" ./install.sh
          test "$(readlink "$test_home/.zshrc")" = "$GITHUB_WORKSPACE/.zshrc"
          HOME="$test_home" zsh -dfc 'source "$HOME/.zshrc"'
